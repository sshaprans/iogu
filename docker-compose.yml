services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./dist:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=site_db
      - DB_USER=root
      - DB_PASSWORD=root_password

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: site_db
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password
    depends_on:
      - db

volumes:
  db_data: